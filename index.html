<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yummy</title>
    <!--==== Main Logo ====-->
    <link rel="icon" href="./assets/images/logo.png">
    <!--==== Bootstrap Icons ====-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!--==== Font Awesome ====-->
    <link rel="stylesheet" href="./css/all.min.css">
    <!--==== Bootstrap Files ====-->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <!--==== Main Css ====-->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!--==== Loading Screen ====-->
    <div class="loading-screen position-fixed top-0 bottom-0 start-0 end-0 bg-black">
        <div class="sk-circle">
            <div class="sk-circle1 sk-child"></div>
            <div class="sk-circle2 sk-child"></div>
            <div class="sk-circle3 sk-child"></div>
            <div class="sk-circle4 sk-child"></div>
            <div class="sk-circle5 sk-child"></div>
            <div class="sk-circle6 sk-child"></div>
            <div class="sk-circle7 sk-child"></div>
            <div class="sk-circle8 sk-child"></div>
            <div class="sk-circle9 sk-child"></div>
            <div class="sk-circle10 sk-child"></div>
            <div class="sk-circle11 sk-child"></div>
            <div class="sk-circle12 sk-child"></div>
        </div>
    </div>

    <!--==== Search ====-->
    <section class="search">
        <div class="container w-75">
            <div class="row py-4" id="rowData">

            </div>
        </div>
    </section>

    <section class="min-vh-100 meals position-relative d-flex justify-content-center align-items-center flex-column">
        <div class="inner-loading-screen position-fixed top-0 bottom-0 start-0 end-0">
            <div class="sk-circle">
                <div class="sk-circle1 sk-child"></div>
                <div class="sk-circle2 sk-child"></div>
                <div class="sk-circle3 sk-child"></div>
                <div class="sk-circle4 sk-child"></div>
                <div class="sk-circle5 sk-child"></div>
                <div class="sk-circle6 sk-child"></div>
                <div class="sk-circle7 sk-child"></div>
                <div class="sk-circle8 sk-child"></div>
                <div class="sk-circle9 sk-child"></div>
                <div class="sk-circle10 sk-child"></div>
                <div class="sk-circle11 sk-child"></div>
                <div class="sk-circle12 sk-child"></div>
            </div>
        </div>

        <!--==== Main Meals ====-->
        <section>
            <div class="container">
                <div class="row py-4 g-4" id="innerBody">

                </div>
            </div>
        </section>

        <!--==== Register ====-->
        <!-- <div class="box" id="box">

        </div> -->
    </section>

    <!--==== Register Complete ====-->
    <section class="w-50 m-auto d-none justify-content-center flex-column align-items-center vh-100"
        id="registerComplete">
        <img src="./assets/images/2023-06-12 (1).png" alt="registerComplete" class="w-100">
        <button class="btn btn-warning form-control mt-3">Back To
            Home</button>
    </section>

    <!--==== SideBar ====-->
    <div class="side-nav-menu min-vh-100 position-fixed top-0 bottom-0 d-flex">
        <div class="nav-tab d-flex flex-column justify-content-between min-vh-100 p-4">
            <ul class="links p-0 vstack gap-3 overflow-hidden">
                <li class="position-relative">Search</li>
                <li class="position-relative">Categories</li>
                <li class="position-relative">Area</li>
                <li class="position-relative">Ingredients</li>
                <li class="position-relative">Contact Us</li>
            </ul>
            <div class="nav-footer">
                <div class="icons">
                    <i class="bi bi-facebook"></i>
                    <i class="bi bi-twitter"></i>
                    <i class="bi bi-globe"></i>
                </div>
                <p>Copyright Â© 2019 All Rights<br>
                    Reserved.</p>
            </div>
        </div>
        <div
            class="nav-header py-4 d-flex flex-column justify-content-between align-items-center px-2 bg-white text-black">
            <img class="logo" src="./assets/images/logo.png" alt="Yummy-Logo">
            <i class="open-close-icon bi bi-justify fa-2x"></i>
            <div class="header-icons">
                <i class="bi bi-globe d-block"></i>
                <i class="bi bi-share-fill"></i>
            </div>
        </div>
    </div>

    <!--==== Bootstrap Files ====-->
    <script src="./js/bootstrap.bundle.min.js"></script>
    <!--==== Main Jq ====-->
    <script src="./js/code.jquery.com_jquery-3.7.1.min.js"></script>

    <script src="./js/index.js"></script>
